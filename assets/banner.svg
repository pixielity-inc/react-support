<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="strGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="collectionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#10b981" opacity="0.05"/>
  <circle cx="1100" cy="300" r="200" fill="#06b6d4" opacity="0.05"/>
  <circle cx="600" cy="400" r="180" fill="#8b5cf6" opacity="0.03"/>
  
  <!-- Str icon (text/string symbol) -->
  <g transform="translate(150, 200)">
    <text x="0" y="15" text-anchor="middle" font-family="monospace" font-size="72" font-weight="700" fill="url(#strGradient)" opacity="0.7">Str</text>
  </g>
  
  <!-- Collection icon (array brackets with items) -->
  <g transform="translate(1050, 200)">
    <text x="0" y="10" text-anchor="middle" font-family="monospace" font-size="48" font-weight="700" fill="url(#collectionGradient)" opacity="0.7">[...]</text>
    <circle cx="-20" cy="35" r="6" fill="#10b981" opacity="0.8"/>
    <circle cx="0" cy="35" r="6" fill="#06b6d4" opacity="0.8"/>
    <circle cx="20" cy="35" r="6" fill="#8b5cf6" opacity="0.8"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white">
    @abdokouta/support
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">
    Laravel-style Utilities for TypeScript
  </text>
  
  <!-- Tagline with gradient -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="url(#accentGradient)">
    Str • Collection • MapCollection • SetCollection • BaseRegistry
  </text>
  
  <!-- Bottom accent line -->
  <rect x="400" y="320" width="400" height="4" rx="2" fill="url(#accentGradient)" opacity="0.8"/>
</svg>
