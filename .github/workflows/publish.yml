# =============================================================================
# Publish to npm Workflow
# =============================================================================
# Publishes @abdokouta/react-support to npm when a version tag is pushed.
# Triggered by tags matching v* (e.g., v2.1.0)
#
# Requirements:
# - NPM_TOKEN secret must be configured in repository settings
# =============================================================================

name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build
        run: pnpm run build

      - name: 🧪 Run tests
        run: pnpm run test

      - name: 🚀 Publish to npm
        run: pnpm publish --access public --no-git-checks || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
