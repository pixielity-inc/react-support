# =============================================================================
# Publish to npm Workflow
# =============================================================================
# Automatically publishes packages to npm when a version tag is pushed.
# Triggered by tags matching the pattern v* (e.g., v1.0.0, v1.2.3)
#
# Requirements:
# - NPM_TOKEN secret must be configured in repository settings
# =============================================================================

name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ===========================================================================
  # Publish Job
  # ===========================================================================
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

      - name: Publish @abdokouta/refine
        run: pnpm publish --access public --no-git-checks
        working-directory: packages/refine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
